services:
  xnerf-api:
    build:
      context: .
      dockerfile: xnerf/deployment/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./models:/app/models
      - ./runs:/app/runs
    env_file:
      - .env
    command: uvicorn xnerf.api.app:app --host 0.0.0.0 --port 8000
